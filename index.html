<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipeline CI/CD | Isis</title>
    <style>
        :root {
            --primary: #2ea44f;
            --bg: #f6f8fa;
            --text: #24292f;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background-color: var(--bg); 
            margin: 0; 
            color: var(--text);
        }
        .card { 
            background: white; 
            padding: 2.5rem; 
            border-radius: 12px; 
            box-shadow: 0 8px 24px rgba(149, 157, 165, 0.2); 
            text-align: center;
            max-width: 400px;
            border: 1px solid #d0d7de;
        }
        h1 { margin-bottom: 0.5rem; font-size: 1.5rem; }
        .status-box {
            margin: 1.5rem 0;
            padding: 1rem;
            background: #f8f9fa;
            border-radius: 8px;
            border: 1px id #e1e4e8;
        }
        .badge-container { margin-top: 10px; }
        p { line-height: 1.6; color: #57606a; }
        .footer { font-size: 0.8rem; margin-top: 2rem; color: #8c959f; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🚀 Pipeline CI/CD</h1>
        <p>Projeto acadêmico de automação e deploy contínuo.</p>
        
        <div class="status-box">
            <strong>Status do Build no GitHub:</strong>
            <div class="badge-container">
                <img src="https://github.com/isisbia/first-pipeline/actions/workflows/ci.yml/badge.svg" alt="Status do Pipeline">
            </div>
        </div>

        <p>Este ambiente é atualizado automaticamente a cada commit aprovado nos testes.</p>
        
        <div class="footer">
            Desenvolvido por Isis | Fatec Matão
        </div>
    </div>
</body>
</html>
