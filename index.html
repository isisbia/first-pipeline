<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipeline CI/CD | Isis</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; background-color: #f0f2f5; margin: 0; color: #1a1a1a;
        }
        .container { 
            background: white; padding: 40px; border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center;
            border-top: 5px solid #2ea44f; max-width: 450px;
        }
        h1 { margin-top: 0; color: #24292f; font-size: 24px; }
        .status-card {
            background: #f6f8fa; border: 1px solid #d0d7de;
            padding: 20px; border-radius: 8px; margin: 25px 0;
        }
        .badge { margin-top: 10px; display: block; }
        p { color: #57606a; line-height: 1.5; }
        .footer { font-size: 12px; color: #8c959f; margin-top: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Monitor de Pipeline</h1>
        <p>Projeto de automação para o curso de Desenvolvimento de Software Multiplataforma.</p>
        
        <div class="status-card">
            <strong>Status da Integração:</strong>
            <img class="badge" src="https://github.com/isisbia/first-pipeline/actions/workflows/ci.yml/badge.svg" alt="Status do Pipeline">
        </div>

        <p>A cada <i>push</i> realizado, o GitHub Actions valida os testes e atualiza este ambiente automaticamente.</p>
        
        <div class="footer">
            Desenvolvido por <b>Isis</b> | Fatec Matão
        </div>
    </div>
</body>
</html>
